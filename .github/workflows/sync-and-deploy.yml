name: Sync and Deploy

on:
  # 定时触发：每小时检查一次本地同步
  schedule:
    - cron: '0 * * * *'
  # 手动触发
  workflow_dispatch:
  # 推送时触发
  push:
    branches: [main]

jobs:
  # 任务1：构建项目并部署到 gh-pages 分支
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
          commit_message: "deploy: update from main"
