<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Stellarium Mobile - 移动端星象馆</title>
  <link rel="manifest" href="./manifest.json">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    #info {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 100;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      max-width: 200px;
    }
    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      display: flex;
      gap: 10px;
    }
    button {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.3);
      color: #fff;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      cursor: pointer;
    }
    button:active { background: rgba(255,255,255,0.4); }
    canvas { display: block; }
  </style>
</head>
<body>
  <div id="info">
    <div>🌟 Stellarium Mobile</div>
    <div id="status">加载中...</div>
  </div>
  <div id="controls">
    <button onclick="toggleConstellations()">星座</button>
    <button onclick="toggleDSO()">深空</button>
    <button onclick="toggleGrid()">网格</button>
  </div>

  <!-- Three.js -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="./src/main.js"></script>

  <script>
    // 简单的 UI 控制
    function toggleConstellations() {
      console.log('切换星座显示');
    }
    function toggleDSO() {
      console.log('切换深空天体显示');
    }
    function toggleGrid() {
      console.log('切换坐标网格');
    }

    // 更新状态显示
    window.addEventListener('load', () => {
      setTimeout(() => {
        const status = document.getElementById('status');
        if (status) status.textContent = '已就绪 - 查看控制台';
      }, 2000);
    });
  </script>
</body>
</html>
